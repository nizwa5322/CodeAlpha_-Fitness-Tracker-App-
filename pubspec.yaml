name: task4_fitnesstracherapp
description: A fitness tracking app with dashboard and activity logging
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # UI & Utilities
  intl: ^0.18.1
  fl_chart: ^0.63.0
  
  # Optional: For better UI
  flutter_staggered_animations: ^1.1.0
  shimmer: ^3.0.0
  
  # Optional: For Firebase integration
  # firebase_core: ^2.24.2
  # cloud_firestore: ^4.13.6
  
  # Optional: For local storage
  shared_preferences: ^2.2.2
  
  # Optional: For charts
  syncfusion_flutter_charts: ^23.1.43
  
  # Optional: For notifications
  # flutter_local_notifications: ^16.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/